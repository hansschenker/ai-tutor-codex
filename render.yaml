services:
  - type: web
    name: ai-tutor-codex-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://ai-tutor-codex-frontend.onrender.com

  - type: web
    name: ai-tutor-codex-frontend
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: VITE_API_URL
        value: https://ai-tutor-codex-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
